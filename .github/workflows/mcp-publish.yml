name: Publish to MCP Registry

# Publie server.json au registre MCP officiel (registry.modelcontextprotocol.io)
# sous le namespace io.github.digitalweb33333-creator/x402-solana, authentifié via
# GitHub Actions OIDC (aucun login interactif / aucun secret requis).
on:
  workflow_dispatch:
  push:
    branches: [main]
    paths: ["server.json", ".github/workflows/mcp-publish.yml"]

permissions:
  id-token: write   # requis pour l'OIDC GitHub -> namespace io.github.<owner>/*
  contents: read

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Download mcp-publisher
        run: |
          curl -fsSL "https://github.com/modelcontextprotocol/registry/releases/download/v1.7.9/mcp-publisher_linux_amd64.tar.gz" -o mcp-publisher.tar.gz
          tar xzf mcp-publisher.tar.gz
          chmod +x mcp-publisher

      - name: Validate server.json
        run: ./mcp-publisher validate

      - name: Authenticate (GitHub OIDC)
        run: ./mcp-publisher login github-oidc

      - name: Publish
        run: ./mcp-publisher publish
